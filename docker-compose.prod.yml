# Production application stack — layered on top of the base data services.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# The base file (docker-compose.yml) provides postgres + redis with their
# healthchecks and volumes; this file adds the one-shot migration step and the
# three application services. Inside the compose network the data hosts are the
# service names `postgres` and `redis`, so DATABASE_URL/REDIS_URL are set here
# rather than taken from .env (whose localhost values are for host-side dev).
#
# Secrets (JWT_*, OAuth, ANTHROPIC_API_KEY, …) come from `.env` via env_file.
# Copy .env.example to .env and fill it in before deploying.

services:
  # ── Schema migration: runs once, must finish before api/worker start ───────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: adysre-api
    command: ['pnpm', '--filter', '@adysre/database', 'db:deploy']
    environment:
      DATABASE_URL: postgresql://adysre:adysre@postgres:5432/adysre?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # ── REST API (/api/v1) ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: adysre-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://adysre:adysre@postgres:5432/adysre?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Background jobs (BullMQ) ────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: adysre-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://adysre:adysre@postgres:5432/adysre?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Web dashboard (Next.js) ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Inlined into the client bundle at build time. Override for a real
        # domain: the browser (not the container) calls this URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    image: adysre-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - api
